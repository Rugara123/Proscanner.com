<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Digit Analysis</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
}

header{
    padding:20px;
    background:#111827;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#172033;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
}

.digit{
    font-size:70px;
    text-align:center;
    color:#00ff88;
    font-weight:bold;
}


.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}


.meter{
    width:120px;
    height:120px;
    border-radius:50%;
    background:conic-gradient(#00ff88 0% 52%, #374151 52% 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}


.inner{
    width:90px;
    height:90px;
    background:#172033;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
}


.title{
    text-align:center;
    margin-top:10px;
}


.cursor{
    text-align:center;
    font-size:25px;
    color:#00ff88;
}


.box{
    background:#1f2937;
    padding:15px;
    border-radius:15px;
}


button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
}
.meter{
    position:relative;
    background:conic-gradient(
        #ef4444 0% 33%,
        #facc15 33% 66%,
        #00ff88 66% 100%
    );
}


.needle{
    position:absolute;
    width:4px;
    height:55px;
    background:white;
    top:5px;
    left:58px;
    transform-origin:bottom center;
    transform:rotate(-90deg);
    transition:0.8s ease;
    border-radius:10px;
    }
</style>

</head>


<body>

<header>
ProScanner Digit Analysis
</header>


<div class="container">


<div class="card">

<h3>Latest Digit</h3>

<div class="digit" id="latestDigit">
7
</div>

<p style="text-align:center">
Current tick digit
</p>

</div>



<div class="grid">


<div class="card">

<div class="meter" id="evenMeter">
    <div class="needle" id="evenNeedle"></div>

<div class="inner" id="evenPercent">
52%
</div>

</div>

<div class="title">
Even
</div>

<div class="cursor">
⬆
</div>
<div id="evenConfidence">
Analyzing...
</div>
</div>



<div class="card">

<div class="meter" id="overMeter">
    <div class="needle" id="overNeedle"></div>
<div class="inner" id="overPercent">
61%
</div>

</div>

<div class="title">
Over 5
</div>

<div class="cursor">
⬆
</div>
<div class="cursor">
⬆
</div>
</div>


</div>



<div class="card">

<h3>Digit Statistics</h3>

<div class="box">
Digit 7 Frequency: 14%
</div>

<br>

<div class="box">
Different Digits Probability: 86%
</div>

</div>



<div class="card">

<h3>Tick History</h3>

<div class="box" id="tickHistory">
7 → 2 → 9 → 4 → 1 → 6
</div>

</div>



<button>
Connect Deriv Market
</button>



</div>

<script src="analysis.js"></script>
</body>
</html>
