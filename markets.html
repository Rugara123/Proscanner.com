<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Digit Markets</title>


<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;
}


header{
background:#111827;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}


.container{
padding:20px;
}


.card{

background:#172033;
padding:20px;
border-radius:18px;
margin-bottom:20px;

}



/* Trade menu */

.trade-menu{

display:flex;
overflow-x:auto;
gap:12px;
margin-bottom:20px;

}



.trade-btn{

background:#1f2937;
padding:12px 18px;
border-radius:20px;
white-space:nowrap;
cursor:pointer;

}



.trade-btn.active{

background:#2563eb;

}






.circle-row{

display:flex;
justify-content:space-around;

}



.meter{

width:120px;
height:120px;
border-radius:50%;
background:#374151;

display:flex;
align-items:center;
justify-content:center;

}



.inner{

width:90px;
height:90px;
border-radius:50%;
background:#111827;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

}




.label{

text-align:center;
margin-top:10px;

}




.digit{

font-size:70px;
text-align:center;
font-weight:bold;
color:#00ff88;

}




.bar{

height:12px;
background:#374151;
border-radius:10px;
overflow:hidden;

}



.bar div{

height:100%;
width:0%;
background:#00ff88;

}





.tick-container{

display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;

}



.tick{

width:42px;
height:42px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

}




.confidence{

text-align:center;
margin-top:15px;
font-size:18px;

}



</style>

</head>


<body>


<header>

ProScanner Digit Markets

</header>



<div class="container">



<div class="trade-menu">


<div class="trade-btn active">
Even/Odd
</div>


<div class="trade-btn">
Over/Under
</div>


<div class="trade-btn">
Matches
</div>


<div class="trade-btn">
Differs
</div>


<div class="trade-btn">
Higher/Lower
</div>



</div>





<div class="card">


<h2 id="tradeTitle">
Even / Odd
</h2>



<div class="circle-row">



<div>

<div class="meter">

<div class="inner" id="evenPercent">
50%
</div>

</div>

<div class="label">
Even
</div>

</div>





<div>

<div class="meter">

<div class="inner" id="oddPercent">
50%
</div>

</div>

<div class="label">
Odd
</div>

</div>



</div>



<div class="confidence" id="evenConfidence">

Analyzing...

</div>

</div>




<div class="card" id="strengthCard">


<h3>📊 Market Strength</h3>



<p id="strengthLabel">
Even Strength
</p>


<div class="bar">

<div id="strengthBar"></div>

</div>



<div class="confidence" id="marketStatus">

Analyzing...

</div>



</div>







<div class="card">


<h3>Latest Digit</h3>


<div class="digit" id="latestDigit">

7

</div>



</div>







<div class="card">


<h3>Tick History</h3>



<div class="tick-container" id="tickHistory">


</div>



<div class="confidence" id="tickFlow">

Analyzing flow...

</div>



</div>







<div class="card">


<h3>Over / Under</h3>


<div class="circle-row">



<div>

<div class="meter">

<div class="inner" id="overPercent">

50%

</div>

</div>


<div class="label">

Over 5

</div>


</div>





<div>

<div class="meter">

<div class="inner" id="underPercent">

50%

</div>

</div>


<div class="label">

Under 5

</div>


</div>



</div>


</div>








</div>





<script src="analysis.js"></script>


</body>

</html>
