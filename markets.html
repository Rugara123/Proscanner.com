<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Digit Markets</title>


<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;

}


header{

background:#111827;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;

}


.container{

padding:20px;

}



.card{

background:#172033;
padding:20px;
border-radius:18px;
margin-bottom:20px;

}




.trade-menu{

display:flex;
overflow-x:auto;
gap:12px;
margin-bottom:20px;

}



.trade-btn{

background:#1f2937;
padding:12px 18px;
border-radius:20px;
white-space:nowrap;

}



.trade-btn.active{

background:#2563eb;

}






.digit{

font-size:70px;
font-weight:bold;
text-align:center;
color:#00ff88;

}






.bar-box{

margin-top:20px;

}



.bar-label{

display:flex;
justify-content:space-between;
margin-bottom:6px;

}



.bar{

height:15px;
background:#374151;
border-radius:10px;
overflow:hidden;

}



.bar-fill{

height:100%;
width:50%;
background:#00ff88;
transition:.5s;

}




.trade-choice{

display:flex;
gap:15px;
margin-top:20px;

}



.choice-btn{

flex:1;
padding:14px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
font-weight:bold;

}



.choice-btn.selected{

background:#2563eb;

}





.tick-container{

display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;

}



.tick{

width:42px;
height:42px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

}



.confidence{

text-align:center;
margin-top:15px;

}


</style>


</head>


<body>


<header>

ProScanner Digit Markets

</header>



<div class="container">


<div class="trade-menu">


<div class="trade-btn active" data-market="evenodd">
Even/Odd
</div>


<div class="trade-btn" data-market="overunder">
Over/Under
</div>


<div class="trade-btn" data-market="matches">
Matches
</div>


<div class="trade-btn" data-market="differs">
Differs
</div>


<div class="trade-btn" data-market="higherlower">
Higher/Lower
</div>


</div>





<div class="card">


<h2 id="marketTitle">

Even / Odd

</h2>



<h3>
Latest Digit
</h3>


<div class="digit" id="latestDigit">

7

</div>

<div class="bar-box">


<div class="bar-label">

<span id="firstLabel">
Even
</span>


<span id="firstPercent">
50%

</span>

</div>



<div class="bar">

<div class="bar-fill" id="firstBar">

</div>

</div>


</div>






<div class="bar-box">


<div class="bar-label">

<span id="secondLabel">
Odd
</span>


<span id="secondPercent">
50%

</span>

</div>



<div class="bar">

<div class="bar-fill" id="secondBar">

</div>

</div>


</div>







<h3>

Select Trade

</h3>


<div class="trade-choice">


<button class="choice-btn" id="firstChoice">

EVEN

</button>



<button class="choice-btn" id="secondChoice">

ODD

</button>



</div>



</div>








<div class="card">


<h3>
Tick History
</h3>


<div class="tick-container" id="tickHistory">

</div>



<div class="confidence" id="tickFlow">

Analyzing Flow...

</div>



</div>







</div>





<script src="analysis.js"></script>


</body>

</html>
