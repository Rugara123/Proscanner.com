<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Digit Markets</title>


<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;
}


header{

background:#111827;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;

}



.container{

padding:20px;

}




.card{

background:#172033;
padding:20px;
border-radius:18px;
margin-bottom:20px;

}





/* scrolling market menu */

.trade-menu{

display:flex;
overflow-x:auto;
gap:12px;
margin-bottom:20px;

}



.trade-btn{

background:#1f2937;
padding:12px 18px;
border-radius:20px;
white-space:nowrap;

}



.trade-btn.active{

background:#2563eb;

}





.circle-row{

display:flex;
justify-content:space-around;
gap:15px;

}




.meter{

width:120px;
height:120px;
border-radius:50%;

background:#374151;

display:flex;
align-items:center;
justify-content:center;

}





.inner{

width:90px;
height:90px;

background:#111827;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

}




.label{

text-align:center;
margin-top:10px;

}




.bar{

height:12px;
background:#374151;
border-radius:10px;
overflow:hidden;

}




.bar div{

height:100%;
width:0%;

background:#00ff88;

transition:.5s;

}





.digit{

font-size:70px;
font-weight:bold;
text-align:center;
color:#00ff88;

}





.tick-container{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;

}




.tick{

width:42px;
height:42px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

}




.confidence{

text-align:center;
margin-top:15px;

}


</style>

</head>



<body>



<header>

ProScanner Digit Markets

</header>




<div class="container">



<div class="trade-menu">


<div class="trade-btn active" data-market="evenodd">
Even/Odd
</div>



<div class="trade-btn" data-market="overunder">
Over/Under
</div>



<div class="trade-btn" data-market="matches">
Matches
</div>



<div class="trade-btn" data-market="differs">
Differs
</div>



<div class="trade-btn" data-market="higherlower">
Higher/Lower
</div>



</div>





<div class="card">


<h2 id="marketTitle">
Even / Odd
</h2>



<div class="circle-row">



<div>

<div class="meter">

<div class="inner" id="firstPercent">
50%
</div>

</div>


<div class="label" id="firstLabel">
Even
</div>


</div>





<div>

<div class="meter">

<div class="inner" id="secondPercent">
50%
</div>

</div>


<div class="label" id="secondLabel">
Odd
</div>


</div>



</div>





<div class="confidence" id="marketStatus">

Analyzing...

</div>


</div>

<div class="card">


<h3>📊 Market Strength</h3>


<p id="strengthLabel">

Even/Odd Strength

</p>


<div class="bar">

<div id="strengthBar"></div>

</div>



</div>








<div class="card">


<h3>Latest Digit</h3>


<div class="digit" id="latestDigit">

7

</div>



</div>








<div class="card">


<h3>Tick History</h3>


<div class="tick-container" id="tickHistory">

</div>



<div class="confidence" id="tickFlow">

Analyzing Flow...

</div>



</div>







</div>





<script src="analysis.js"></script>


</body>


</html>
