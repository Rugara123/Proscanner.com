<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Digit Markets</title>


<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
}


header{
    background:#111827;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}


.container{
    padding:20px;
}


.card{
    background:#172033;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
}


.analysis-slider{

    display:flex;
    overflow-x:auto;
    gap:20px;
    scroll-snap-type:x mandatory;

}


.analysis-card{

    min-width:90%;
    background:#172033;
    padding:20px;
    border-radius:18px;
    scroll-snap-align:start;

}



.meter{

    width:130px;
    height:130px;
    border-radius:50%;
    position:relative;

    background:#374151;

    display:flex;
    align-items:center;
    justify-content:center;

    margin:auto;

}



.inner{

    width:95px;
    height:95px;

    background:#172033;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;
    font-weight:bold;

}



.needle{

    position:absolute;

    width:4px;
    height:60px;

    background:white;

    top:5px;
    left:63px;

    transform-origin:bottom center;

    transform:rotate(-90deg);

    transition:0.8s ease;

    border-radius:10px;

}



.title{

    text-align:center;

    margin-top:15px;

    font-size:18px;

}



.confidence{

    text-align:center;

    margin-top:10px;

    font-size:18px;

}


.digit{

    font-size:70px;

    text-align:center;

    color:#00ff88;

    font-weight:bold;

}



.box{

    background:#1f2937;

    padding:15px;

    border-radius:12px;

}



button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:16px;

}


</style>


</head>


<body>


<header>

ProScanner Digit Markets

</header>


<div class="container">


<div class="card">

<h3>Latest Digit</h3>

<div class="digit" id="latestDigit">
7
</div>

<p style="text-align:center">
Live tick digit
</p>

</div>
</div>


<div class="analysis-slider">


<!-- EVEN / ODD -->

<div class="analysis-card">

<h3>Even / Odd</h3>


<div class="meter" id="evenMeter">

<div class="needle" id="evenNeedle"></div>


<div class="inner" id="evenPercent">
52%
</div>

</div>


<div class="title">
Even Probability
</div>


<div class="confidence" id="evenConfidence">
Analyzing...
</div>


</div>




<!-- OVER / UNDER -->

<div class="analysis-card">

<h3>Over / Under</h3>


<div class="meter" id="overMeter">

<div class="needle" id="overNeedle"></div>


<div class="inner" id="overPercent">
61%
</div>


</div>


<div class="title">
Over 5 Probability
</div>


<div class="confidence" id="overConfidence">
Analyzing...
</div>


</div>


</div>



<div class="card">

<h3>🔥 Hot Digits</h3>

<div class="box" id="hotDigits">
Analyzing...
</div>


<br>


<h3>❄️ Cold Digits</h3>

<div class="box" id="coldDigits">
Analyzing...
</div>

</div>




<div class="card">

<h3>Tick History</h3>


<div class="box" id="tickHistory">
7 → 2 → 9 → 4 → 1 → 6
</div>


</div>




<div class="card">

<button>
Connect Deriv Market
</button>

</div>



</div>



<script src="analysis.js"></script>


</body>

    </html>
