<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Digit Markets</title>


<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;

}


header{

background:#111827;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;

}



.container{

padding:20px;

}



.card{

background:#172033;
padding:20px;
border-radius:18px;
margin-bottom:20px;

}



.analysis-slider{

display:flex;
overflow-x:auto;
gap:20px;

}



.analysis-card{

min-width:90%;
background:#1f2937;
padding:20px;
border-radius:18px;

}




.circle-row{

display:flex;
justify-content:space-around;
gap:15px;

}



.meter{

width:120px;
height:120px;
border-radius:50%;

background:#374151;

display:flex;
align-items:center;
justify-content:center;

transition:.5s;

}



.inner{

width:90px;
height:90px;

background:#111827;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
font-weight:bold;

}




.label{

text-align:center;
margin-top:10px;

}



.confidence{

text-align:center;
margin-top:15px;
font-size:18px;

}



.digit{

font-size:70px;
font-weight:bold;
text-align:center;
color:#00ff88;

}




.bar{

height:12px;
background:#374151;
border-radius:10px;
overflow:hidden;
margin-bottom:15px;

}



.bar div{

height:100%;
width:0%;

background:#00ff88;

transition:.5s;

}




.tick-container{

display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;

}



.tick{

width:42px;
height:42px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
font-size:18px;

}




button{

width:100%;
padding:15px;

border:none;
border-radius:12px;

background:#2563eb;
color:white;

font-size:16px;

}


</style>


</head>


<body>


<header>

ProScanner Digit Markets

</header>



<div class="container">



<div class="card">

<h3>Latest Digit</h3>

<div class="digit" id="latestDigit">
7
</div>

</div>





<div class="analysis-slider">



<div class="analysis-card">


<h2>Even / Odd</h2>


<div class="circle-row">


<div>

<div class="meter">

<div class="inner" id="evenPercent">
50%
</div>

</div>

<div class="label">
Even
</div>

</div>




<div>

<div class="meter">

<div class="inner" id="oddPercent">
50%
</div>

</div>

<div class="label">
Odd
</div>

</div>


</div>


<div class="confidence" id="evenConfidence">
Analyzing...
</div>


</div>

<div class="analysis-card">


<h2>Over / Under</h2>



<div class="circle-row">


<div>


<div class="meter">

<div class="inner" id="overPercent">
50%
</div>

</div>


<div class="label">
Over 5
</div>


</div>





<div>


<div class="meter">

<div class="inner" id="underPercent">
50%
</div>

</div>


<div class="label">
Under 5
</div>


</div>


</div>


<div class="confidence" id="overConfidence">
Analyzing...
</div>



</div>



</div>





<div class="card">


<h3>📊 Market Strength</h3>



<p>Even</p>

<div class="bar">

<div id="evenBar"></div>

</div>




<p>Odd</p>

<div class="bar">

<div id="oddBar"></div>

</div>




<p>Over 5</p>

<div class="bar">

<div id="overBar"></div>

</div>




<p>Under 5</p>

<div class="bar">

<div id="underBar"></div>

</div>




<div class="confidence" id="marketStatus">

Analyzing...

</div>



</div>






<div class="card">


<h3>Tick History</h3>


<div class="tick-container" id="tickHistory">

</div>


<br>


<div class="confidence" id="tickFlow">

Analyzing flow...

</div>


</div>






<div class="card">


<button>

Connect Deriv Market

</button>


</div>





</div>



<script src="analysis.js"></script>


</body>


    </html>
