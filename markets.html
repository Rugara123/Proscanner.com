<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Digit Markets</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#172033;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
}

.digit{
    font-size:60px;
    text-align:center;
    color:#00ff88;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.box{
    background:#1f2937;
    padding:15px;
    border-radius:12px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
}
</style>

</head>

<body>

<header>
ProScanner Digit Markets
</header>


<div class="container">


<div class="card">

<h3>Latest Digit</h3>

<div class="digit">
7
</div>

<p style="text-align:center;">
Last tick digit
</p>

</div>


<div class="grid">

<div class="box">
<h3>Even/Odd</h3>
<p>Even: 52%</p>
<p>Odd: 48%</p>
</div>


<div class="box">
<h3>Over/Under</h3>
<p>Over 5: 61%</p>
<p>Under 5: 39%</p>
</div>


<div class="box">
<h3>Matches</h3>
<p>Digit 7: 14%</p>
</div>


<div class="box">
<h3>Differs</h3>
<p>Chance: 86%</p>
</div>

</div>


<br>

<div class="card">

<h3>Market Selection</h3>

<button>
Select Digit Market
</button>

</div>


</div>

</body>
</html>
