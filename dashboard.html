<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProScanner Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
}

header{
    padding:20px;
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#172033;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.balance{
    font-size:36px;
    font-weight:bold;
    margin:10px 0;
    color:#00ff88;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.stat{
    background:#1f2937;
    padding:15px;
    border-radius:15px;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

button{
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
}

.market{
    display:flex;
    justify-content:space-between;
    background:#1f2937;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

.green{
    color:#00ff88;
}

.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111827;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
}

.bottom div{
    font-size:14px;
}
</style>

</head>

<body>

<header>
<div>ProScanner</div>
<div>🔔</div>
</header>


<div class="container">

<div class="card">

<h2 id="welcome">Welcome 👋</h2>

<p>Demo Balance</p>

<div class="balance">
$10,000.00
</div>

<div class="buttons">
<button>Deposit</button>
<button>Withdraw</button>
</div>

</div>


<div class="stats">

<div class="stat">
📈 Profit
<br>
<b>$250.00</b>
</div>

<div class="stat">
📊 Trades
<br>
<b>24</b>
</div>

</div>


<div class="card">

<h3>Markets</h3>

<div class="market">
<span>EUR/USD</span>
<span class="green">+0.45%</span>
</div>

<div class="market">
<span>Gold</span>
<span class="green">+0.32%</span>
</div>

<div class="market">
<span>Volatility Index</span>
<span class="green">+0.18%</span>
</div>

</div>


<div class="card">

<h3>Quick Actions</h3>

<button>📈 Start Trading</button>
<br><br>
<button>📊 Trade History</button>
<br><br>
<button>👤 Profile</button>

</div>


</div>


<div class="bottom">
<div>🏠 Home</div>
<div>📈 Markets</div>
<div>💹 Trade</div>
<div>👤 Account</div>
</div>


<script type="module" src="dashboard.js"></script>

</body>
</html>
