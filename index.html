<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proscanner</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1220;
color:white;
}

header{
padding:20px;
text-align:center;
background:#111827;
font-size:28px;
font-weight:bold;
color:#00e676;
}

.hero{
padding:50px 20px;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:20px;
}

.hero p{
font-size:18px;
opacity:.8;
margin-bottom:30px;
}

button{
padding:15px 30px;
font-size:18px;
background:#00e676;
border:none;
border-radius:8px;
cursor:pointer;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
}

.card h2{
margin-bottom:10px;
color:#00e676;
}

footer{
text-align:center;
padding:20px;
background:#111827;
margin-top:40px;
}
</style>

</head>

<body>

<header>
Proscanner
</header>

<section class="hero">

<h1>Welcome to Proscanner</h1>

<p>
Professional Trading Analysis Platform
</p>

<button>
Get Started
</button>

</section>

<section class="features">

<div class="card">
<h2>Market Scanner</h2>
<p>Scan trading opportunities in seconds.</p>
</div>

<div class="card">
<h2>Signals</h2>
<p>Receive high quality trading signals.</p>
</div>

<div class="card">
<h2>Analytics</h2>
<p>Advanced market statistics and insights.</p>
</div>

</section>

<footer>
© 2026 Proscanner
</footer>

</body>
</html>
